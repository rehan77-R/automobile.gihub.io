<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In - RDR2 PC Parts</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Rajdhani', sans-serif; }
    .logo-font { font-family: 'Orbitron', monospace; }
    .hero-bg { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
    .glow { text-shadow: 0 0 20px #6366f1; }
    .nav-glass { background: rgba(15,12,41,0.95); backdrop-filter: blur(10px); }
    .input-style { background: rgba(255,255,255,0.05); border: 1px solid rgba(99,102,241,0.3); color: white; transition: border-color 0.3s; }
    .input-style:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
    .input-style::placeholder { color: rgba(255,255,255,0.3); }
    .card-bg { background: linear-gradient(145deg, #1e1b4b, #0f0c29); border: 1px solid rgba(99,102,241,0.3); }
    .btn-glow:hover { box-shadow: 0 0 25px rgba(99,102,241,0.6); }
  </style>
</head>
<body class="min-h-screen hero-bg flex flex-col">

  <!-- Navbar -->
  <!-- signin.html is inside: src/pages/sign in/  => 3 levels up to reach index.html -->
  <nav class="nav-glass border-b border-indigo-900 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-between items-center h-16">
        <a href="../../../index.html" class="logo-font text-xl font-bold text-indigo-400 glow tracking-widest">RDR2</a>
        <div class="flex space-x-6 items-center">
          <a href="../../../index.html"          class="text-gray-400 hover:text-white transition font-semibold">🏠 Home</a>
          <a href="../about/about.html"          class="text-gray-400 hover:text-white transition font-semibold">About</a>
          <a href="../contact/contact.html"      class="text-gray-400 hover:text-white transition font-semibold">Contact</a>
          <a href="../sign up/signup.html"       class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 transition font-semibold">Sign Up</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Form -->
  <div class="flex-1 flex items-center justify-center py-12 px-4">
    <div class="card-bg rounded-2xl shadow-2xl p-10 w-full max-w-md">

      <div class="text-center mb-8">
        <div class="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-sm mx-auto mb-3 logo-font border-2 border-indigo-400">RDR2</div>
        <h1 class="logo-font text-2xl font-bold text-white">Welcome Back</h1>
        <p class="text-indigo-300 text-sm mt-1">Sign in to your account</p>
      </div>

      <!-- Success -->
      <div id="successMsg" class="hidden bg-green-900 border border-green-500 text-green-300 rounded-lg p-4 mb-6 text-center font-semibold">
        ✅ Login successful! Redirecting to Home...
      </div>
      <!-- Error -->
      <div id="errorMsg" class="hidden bg-red-900 border border-red-500 text-red-300 rounded-lg p-4 mb-6 text-center font-semibold"></div>

      <form id="signinForm" onsubmit="handleSignin(event)">

        <div class="mb-4">
          <label class="block text-sm font-semibold text-indigo-300 mb-1">Email Address</label>
          <input id="email" type="email" placeholder="ali@example.com" class="input-style w-full rounded-lg px-4 py-2.5 text-sm" required/>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-semibold text-indigo-300 mb-1">Password</label>
          <input id="password" type="password" placeholder="Enter your password" class="input-style w-full rounded-lg px-4 py-2.5 text-sm" required/>
        </div>

        <div class="flex justify-between items-center mb-6">
          <label class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer">
            <input type="checkbox" class="w-4 h-4 accent-indigo-500"/>
            Remember me
          </label>
          <a href="#" class="text-sm text-indigo-400 hover:underline">Forgot Password?</a>
        </div>

        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg text-sm transition btn-glow logo-font tracking-wider">
          SIGN IN →
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a href="../sign up/signup.html" class="text-indigo-400 font-bold hover:underline">Sign Up</a>
      </p>
    </div>
  </div>

  <footer class="bg-gray-900 border-t border-gray-800 text-gray-500 py-4 text-center text-sm">
    © 2026 RDR2 PC Parts Store. All rights reserved.
  </footer>

<script>
function handleSignin(e) {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const errorMsg  = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');

  errorMsg.classList.add('hidden');

  let users = JSON.parse(localStorage.getItem('rdr2_users') || '[]');
  const user = users.find(u => u.email === email && u.password === password);

  if (!user) {
    errorMsg.textContent = '❌ Invalid email or password! Please check and try again.';
    errorMsg.classList.remove('hidden');
    return;
  }

  // Save logged in user
  localStorage.setItem('rdr2_loggedIn', JSON.stringify({ name: user.firstName + ' ' + user.lastName, email: user.email }));

  successMsg.textContent = `✅ Welcome back, ${user.firstName}! Redirecting...`;
  successMsg.classList.remove('hidden');
  document.getElementById('signinForm').style.opacity = '0.4';
  document.getElementById('signinForm').style.pointerEvents = 'none';

  setTimeout(() => { window.location.href = '../../../index.html'; }, 2000);
}
</script>
</body>
</html>
