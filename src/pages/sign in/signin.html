<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in RDR2</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-blue-200 flex items-center justify-center">
  <div class="bg-blue-100 rounded-2xl shadow-lg p-10 w-full max-w-md">
    
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold text-xl mx-auto mb-3">RDR2</div>
      <h1 class="text-2xl font-bold text-gray-900">Sign In to RDR2</h1>
      <p class="text-gray-500 text-sm mt-1">Welcome back!</p>
    </div>

    <!-- Error message -->
    <div id="error-msg" class="hidden mb-4 text-sm text-red-600 bg-red-100 border border-red-300 rounded-lg px-4 py-2.5 text-center"></div>

    <!-- Form -->
    <form id="signin-form">
      <!-- Email -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-900 mb-1">Email Address</label>
        <input id="email" type="email" placeholder="123@example.com"
          class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-blue-400"/>
      </div>
      <!-- Password -->
      <div class="mb-7">
        <label class="block text-sm font-medium text-gray-900 mb-1">Password</label>
        <input id="password" type="password" placeholder="Enter your Password"
          class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-blue-400"/>
      </div>
      <!-- Button -->
      <button type="submit" id="signin-btn"
        class="w-full bg-blue-600 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg text-sm transition">
        Sign In
      </button>
    </form>

    <!-- Sign up link -->
    <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account? 
      <a href="../sign up/signup.html" class="text-blue-500 font-semibold hover:underline">Sign Up</a>
    </p>
  </div>

  <script>
    document.getElementById('signin-form').addEventListener('submit', function (e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('error-msg');
      const btn = document.getElementById('signin-btn');

      // Basic validation
      if (!email || !password) {
        errorMsg.textContent = 'Please enter both email and password.';
        errorMsg.classList.remove('hidden');
        return;
      }

      errorMsg.classList.add('hidden');

      // Check if this user signed up before (stored in localStorage)
      const users = JSON.parse(localStorage.getItem('rdr2_users') || '[]');
      const matchedUser = users.find(u => u.email === email && u.password === password);

      if (matchedUser) {
        // Existing user — save session and go to home
        localStorage.setItem('rdr2_current_user', JSON.stringify(matchedUser));
        btn.textContent = 'Signing in...';
        btn.disabled = true;
        setTimeout(() => {
          window.location.href = 'index.html'; // Change to your home page path
        }, 600);
      } else {
        // No matching account — treat as new user sign-in (demo mode)
        const newUser = { email, password, isNew: true };
        users.push(newUser);
        localStorage.setItem('rdr2_users', JSON.stringify(users));
        localStorage.setItem('rdr2_current_user', JSON.stringify(newUser));

        btn.textContent = 'Signing in...';
        btn.disabled = true;
        setTimeout(() => {
          window.location.href = 'index.html'; // Change to your home page path
        }, 600);
      }
    });
  </script>
</body>
</html>
